name: MLOps Automation — Hate Speech Detection

on:
  push:
    branches: [main]
    paths:
      - "src/train/train.py"
      - "data/**"
      - "params.yaml"
      - "tests/**"
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — AUTOMATED TESTING
  # ─────────────────────────────────────────
  test:
    name: "Stage 1 — Automated Testing"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache DVC local storage
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-cache-${{ hashFiles('data/**/*.dvc') }}
          restore-keys: dvc-cache-

      - name: Pull data dari DVC local cache
        run: dvc checkout

      - name: Run unit tests
        run: pytest tests/test_train.py -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2 — AUTOMATED TRAINING
  # ─────────────────────────────────────────
  train:
    name: "Stage 2 — Automated Training"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache DVC local storage
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-cache-${{ hashFiles('data/**/*.dvc') }}
          restore-keys: dvc-cache-

      - name: Pull data dari DVC local cache
        run: dvc checkout

      - name: Run training
        run: python src/train/train.py

      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: src/train/mlruns/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3 — MODEL EVALUATION & VALIDATION
  # JOB 4 — AUTO REGISTRY UPDATE
  # ─────────────────────────────────────────
  evaluate:
    name: "Stage 3+4 — Evaluation & Registry"
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: src/train/mlruns/

      - name: Run evaluation & auto-register
        working-directory: src/train
        run: python ../../evaluate.py

      - name: Notify result
        if: success()
        run: echo "Model lolos validasi dan terdaftar ke MLflow Staging."

      - name: Notify failure
        if: failure()
        run: echo "Model GAGAL validasi. Periksa metrik di MLflow."