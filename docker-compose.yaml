version: "3.9"

# NETWORKS
networks:
  mlops-network:
    driver: bridge

# VOLUMES
volumes:
  mlflow-db:        
  mlflow-artifacts: 

# SERVICES
services:
  
  # ── 1. MLflow Tracking Server ──────────────────────────────
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    container_name: mlflow-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow-db:/mlflow/db
      - mlflow-artifacts:/mlflow/artifacts  
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/db/mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - mlops-network
      
      
  # ── 2. API Inferensi ────────────────────────────────────────
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - REGISTRY_NAME=HateSpeechClassifierV1
    depends_on:
      - mlflow-server
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s