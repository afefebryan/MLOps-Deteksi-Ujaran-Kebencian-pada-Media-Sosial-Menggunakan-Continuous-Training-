version: "3.9"

networks:
  mlops-network:
    driver: bridge

volumes:
  mlflow-db:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:
  minio-data:

services:

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    container_name: mlflow-server
    restart: unless-stopped

    ports:
      - "5000:5000"

    environment:
      # === MinIO / S3 config ===
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_DEFAULT_REGION: us-east-1
      AWS_ALLOW_HTTP: "true"
      MLFLOW_S3_IGNORE_TLS: "true"


    volumes:
      - mlflow-db:/mlflow/db

    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/db/mlflow.db
      --default-artifact-root s3://mlflow-artifacts/
      --serve-artifacts
      --host 0.0.0.0
      --port 5000

    depends_on:
      - minio

    networks:
      - mlops-network

  api-service-1:
    build:
      context: .
      dockerfile: Dockerfile
    image: hate-speech-model
    restart: unless-stopped
    ports:
      - "5001:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - REGISTRY_NAME=HateSpeechClassifierV1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - mlflow-server
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  api-service-2:
    image: hate-speech-model
    restart: unless-stopped
    ports:
      - "5002:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - REGISTRY_NAME=HateSpeechClassifierV1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - mlflow-server
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  api-service-3:
    image: hate-speech-model
    restart: unless-stopped
    ports:
      - "5003:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - REGISTRY_NAME=HateSpeechClassifierV1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
          
    depends_on:
      - mlflow-server
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - api-service-1
      - api-service-2
      - api-service-3
    networks:
      - mlops-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - mlops-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - mlops-network