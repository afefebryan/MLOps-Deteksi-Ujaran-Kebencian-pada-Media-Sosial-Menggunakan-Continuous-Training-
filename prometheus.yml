global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-service"
    static_configs:
      - targets:
          - "api-service-1:8000"
          - "api-service-2:8000"
          - "api-service-3:8000"
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

 